<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>InsightSprint - AI-Powered Market Research & Intelligence Platform</title>
  <meta name="title" content="InsightSprint - AI-Powered Market Research & Intelligence Platform" />
  <meta name="description"
    content="Transform research goals into structured market intelligence in minutes. Automated competitor analysis, market landscape research, and strategic insights powered by AI. Free 20 research runs daily." />
  <meta name="keywords"
    content="market research, AI research, competitor analysis, market intelligence, agentic AI, automated research, business intelligence, market analysis, strategic planning, GenAI" />
  <meta name="author" content="InsightSprint" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://insightsprint.vercel.app/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://insightsprint.vercel.app/" />
  <meta property="og:title" content="InsightSprint - AI-Powered Market Research & Intelligence Platform" />
  <meta property="og:description"
    content="Transform research goals into structured market intelligence in minutes. Automated competitor analysis, market landscape research, and strategic insights powered by AI." />
  <meta property="og:image" content="https://insightsprint.vercel.app/og-image.png" />
  <meta property="og:site_name" content="InsightSprint" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://insightsprint.vercel.app/" />
  <meta property="twitter:title" content="InsightSprint - AI-Powered Market Research & Intelligence Platform" />
  <meta property="twitter:description"
    content="Transform research goals into structured market intelligence in minutes. Automated competitor analysis, market landscape research, and strategic insights powered by AI." />
  <meta property="twitter:image" content="https://insightsprint.vercel.app/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#FF6B35" />
  <meta name="msapplication-TileColor" content="#FF6B35" />

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InsightSprint",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "127"
      },
      "description": "AI-powered market research platform that automates the entire research workflow. Get comprehensive market intelligence, competitor analysis, and strategic insights in minutes.",
      "featureList": [
        "Automated Market Research",
        "Competitor Intelligence",
        "Customer Research",
        "Strategic Planning",
        "Real-time Processing",
        "Research History"
      ],
      "screenshot": "https://insightsprint.vercel.app/screenshot.png"
    }
  </script>

  <!-- Structured Data - WebSite -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "InsightSprint",
      "url": "https://insightsprint.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://insightsprint.vercel.app/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <!-- Paystack Inline Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

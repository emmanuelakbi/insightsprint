<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | InsightSprint</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #121212;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: clamp(4rem, 15vw, 12rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
      color: #FF6B35;
    }

    h2 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      margin-bottom: 2rem;
      color: #666;
      font-weight: 600;
    }

    .button {
      display: inline-block;
      background: #121212;
      color: white;
      padding: 1rem 2rem;
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      border: 4px solid #121212;
      transition: all 0.3s;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    .button:hover {
      background: #FF6B35;
      border-color: #FF6B35;
      transform: translateY(-2px);
    }

    .logo {
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .accent {
      color: #FF6B35;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">
      INSIGHT<span class="accent">SPRINT</span>
    </div>
    <h1>404</h1>
    <h2>Page_Not_Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="button">Return_Home</a>
  </div>
</body>

</html>
